    let player = null;
    let canalActualIndex = 0;
    let categoriaActiva = "Todos";
    let canalesFiltradosActual = [];

    function initPlayer() {
        const video = document.getElementById('musicPlayer');
        if (Hls.isSupported()) {
            player = new Hls({ enableWorker: true, lowLatencyMode: true });
            player.attachMedia(video);
        }
    }

    function canalesFiltrados() {
        let filtrados = canalesMusicales;
        if (categoriaActiva !== "Todos") filtrados = filtrados.filter(c => c.categoria === categoriaActiva);
        const busqueda = document.getElementById('searchChannel')?.value.toLowerCase() || '';
        if (busqueda) filtrados = filtrados.filter(c => c.nombre.toLowerCase().includes(busqueda));
        canalesFiltradosActual = filtrados;
        return filtrados;
    }

    function reproducirCanalPorIndice(index, reintento = 0) {
        const filtrados = canalesFiltrados();
        if (index < 0) index = 0;
        if (index >= filtrados.length) index = filtrados.length - 1;
        const canal = filtrados[index];
        if (!canal) return;
        canalActualIndex = index;
        document.getElementById('nowPlaying').innerHTML = `🔄 ${canal.nombre}...`;
        if (Hls.isSupported() && player && player.destroy) player.destroy();
        initPlayer();
        setTimeout(() => {
            if (Hls.isSupported() && player) {
                player.loadSource(canal.url);
                player.attachMedia(document.getElementById('musicPlayer'));
                const timeout = setTimeout(() => {
                    if (reintento < 2) {
                        const siguienteIndex = (index + 1) % filtrados.length;
                        reproducirCanalPorIndice(siguienteIndex, reintento + 1);
                    }
                }, 8000);
                player.on(Hls.Events.MANIFEST_PARSED, () => {
                    clearTimeout(timeout);
                    const video = document.getElementById('musicPlayer');
                    video.play().catch(e => console.log("play bloqueado"));
                    document.getElementById('nowPlaying').innerHTML = canal.nombre;
                });
            }
        }, 100);
        actualizarListaActiva();
    }

    function actualizarListaActiva() {
        document.querySelectorAll('.channel-item').forEach((item, i) => {
            if (i === canalActualIndex) item.classList.add('active');
            else item.classList.remove('active');
        });
    }

    function siguienteCanal() { 
        const filtrados = canalesFiltrados();
        if (filtrados.length === 0) return;
        const nuevoIndex = (canalActualIndex + 1) % filtrados.length;
        reproducirCanalPorIndice(nuevoIndex);
        if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(30);
    }
    
    function anteriorCanal() { 
        const filtrados = canalesFiltrados();
        if (filtrados.length === 0) return;
        const nuevoIndex = (canalActualIndex - 1 + filtrados.length) % filtrados.length;
        reproducirCanalPorIndice(nuevoIndex);
        if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(30);
    }
    
    function detenerReproduccion() { 
        const video = document.getElementById('musicPlayer'); 
        video.pause(); 
        if (player && player.destroy) player.destroy(); 
        video.src = ''; 
        document.getElementById('nowPlaying').innerHTML = "Detenido"; 
    }
    
    function mostrarCanales() {
        const filtrados = canalesFiltrados();
        document.getElementById('channelsList').innerHTML = filtrados.map((canal, idx) => `
            <div class="channel-item ${idx === canalActualIndex ? 'active' : ''}" onclick="reproducirCanalPorIndice(${idx})">
                <span>🎵</span>
                <div style="flex:1">
                    <div class="channel-name">${escapeHtml(canal.nombre)}</div>
                    <div class="channel-cat">${canal.categoria}</div>
                </div>
            </div>`).join('');
    }
    
    function cargarCategorias() {
        const cats = ["Todos", ...new Set(canalesMusicales.map(c => c.categoria))];
        document.getElementById('categories').innerHTML = cats.map(cat => `<button class="cat-btn ${cat === categoriaActiva ? 'active' : ''}" onclick="cambiarCategoria('${cat}')">${cat}</button>`).join('');
    }
    
    function cambiarCategoria(cat) { 
        categoriaActiva = cat; 
        cargarCategorias(); 
        mostrarCanales(); 
        reproducirCanalPorIndice(0);
    }
    
    function filtrarCanales() { mostrarCanales(); }
    function iniciarCanalPorDefecto() { setTimeout(() => reproducirCanalPorIndice(0), 1500); }

    // ========== GESTOS TÁCTILES CON DETECCIÓN DEL MENÚ ==========
    let touchStartX = 0;
    let touchEndX = 0;

    document.addEventListener('touchstart', function(e) {
        touchStartX = e.changedTouches[0].screenX;
    }, false);

    document.addEventListener('touchend', function(e) {
        const sidebar = document.getElementById('channelsSidebar');
        const isMenuOpen = sidebar.classList.contains('open');
        
        let touchInsideMenu = false;
        if (isMenuOpen) {
            const touch = e.changedTouches[0];
            const rect = sidebar.getBoundingClientRect();
            touchInsideMenu = (touch.clientX >= rect.left && touch.clientX <= rect.right);
        }
        
        if (!isMenuOpen || (isMenuOpen && !touchInsideMenu)) {
            touchEndX = e.changedTouches[0].screenX;
            const diferencia = touchEndX - touchStartX;
            const umbral = 60;
            
            if (Math.abs(diferencia) > umbral) {
                if (diferencia > 0) {
                    siguienteCanal();
                } else {
                    anteriorCanal();
                }
            }
        }
    }, false);

    // ========== DOBLE TAP PARA PANTALLA COMPLETA ==========
    let lastTap = 0;
    const videoElement = document.getElementById('musicPlayer');
    const indicator = document.getElementById('fullscreenIndicator');
    
    function showIndicator(message, isEntering) {
        indicator.textContent = message;
        indicator.style.opacity = '1';
        indicator.style.background = isEntering ? 'rgba(0,0,0,0.7)' : 'rgba(0,0,0,0.7)';
        setTimeout(() => {
            indicator.style.opacity = '0';
        }, 1500);
    }
    
    videoElement.addEventListener('touchend', function(e) {
        const currentTime = new Date().getTime();
        const tapLength = currentTime - lastTap;
        
        if (tapLength < 300 && tapLength > 0) {
            e.preventDefault();
            if (document.fullscreenElement) {
                document.exitFullscreen();
                showIndicator('⛶ Salir de pantalla completa', false);
            } else {
                videoElement.requestFullscreen();
                showIndicator('🖥️ Pantalla completa', true);
            }
        }
        lastTap = currentTime;
    });
    
    // Detectar cambios de pantalla completa
    document.addEventListener('fullscreenchange', function() {
        if (!document.fullscreenElement) {
            showIndicator('⛶ Modo normal', false);
        }
    });

    // UI
    function toggleChannels() { 
        document.getElementById('channelsSidebar').classList.toggle('open'); 
    }
    
    // Cerrar menú al tocar fuera
    document.addEventListener('click', function(e) {
        const sidebar = document.getElementById('channelsSidebar');
        const isOpen = sidebar.classList.contains('open');
        const isClickOnHandle = document.getElementById('toggleChannelsBtn').contains(e.target);
        const isClickOnSidebar = sidebar.contains(e.target);
        
        if (isOpen && !isClickOnSidebar && !isClickOnHandle) {
            sidebar.classList.remove('open');
        }
    });
    
    function escapeHtml(t) { 
        const d = document.createElement('div'); 
        d.textContent = t; 
        return d.innerHTML; 
    }

    // Inicialización
    document.getElementById('toggleChannelsBtn').addEventListener('click', toggleChannels);
    document.getElementById('prevBtn').addEventListener('click', anteriorCanal);
    document.getElementById('nextBtn').addEventListener('click', siguienteCanal);
    
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowUp') { e.preventDefault(); anteriorCanal(); }
        else if (e.key === 'ArrowDown') { e.preventDefault(); siguienteCanal(); }
        else if (e.key === 'f' || e.key === 'F') { 
            e.preventDefault(); 
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                videoElement.requestFullscreen();
            }
        }
    });

    function init() {
        initPlayer();
        cargarCategorias();
        mostrarCanales();
        iniciarCanalPorDefecto();
    }

    window.reproducirCanalPorIndice = reproducirCanalPorIndice;
    window.cambiarCategoria = cambiarCategoria;
    window.filtrarCanales = filtrarCanales;
    window.detenerReproduccion = detenerReproduccion;

    init();
</script>
</body>
</html>
